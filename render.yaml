services:
  - type: web
    name: ai-engineering-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BASE_BRANCH
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_PORT
        value: "3000"
      - key: LOCAL_REPO_PATH
        value: /app/repo
